<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start" class="ion-padding">
      <ion-back-button [mode]="'md'" [defaultHref]="'loterias/' + loteria" default-href="#" text="Voltar"></ion-back-button>
    </ion-buttons>

    <ion-title>Resultados</ion-title>
  </ion-toolbar>
</ion-header>

<ion-loading
  [isOpen]="isLoading"
></ion-loading>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Resultados</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-item-group>
    @if (concurso) {
      <ion-chip>Próximo sorteio: {{ concurso.dataProximoConcurso }}</ion-chip>

      @for (resultado of concurso.dezenas; track resultado) {
        <ion-card>
          <ion-card-header>
            {{ resultado }}
          </ion-card-header>
        </ion-card>
      }
    }
  </ion-item-group>
</ion-content>
